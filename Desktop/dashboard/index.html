<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Análisis</title>
    <!-- Carga de Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuración para usar la fuente Inter -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <!-- CDN para Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4 sm:p-6 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Título del Dashboard -->
        <h1 class="text-3xl font-extrabold text-gray-900 mb-8 border-b pb-2">Panel de Control Principal</h1>

        <!-- SECCIÓN 1: TARJETAS DE ESTADÍSTICAS (4 COLUMNAS EN DESKTOP) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

            <!-- Card 1: Usuarios Totales -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 transition duration-300 hover:shadow-xl">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium text-gray-500">Usuarios Totales</p>
                    <!-- Icono de Usuarios (Placeholder SVG) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <p class="text-3xl font-bold text-gray-900 mt-1">8.249</p>
                <div class="flex items-center mt-3 text-sm">
                    <span class="text-green-600 font-semibold flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 7 13.5 16.5 8.5 11.5 1 19"/></svg>
                        +4.2%
                    </span>
                    <span class="text-gray-500 ml-2">vs. mes pasado</span>
                </div>
            </div>

            <!-- Card 2: Ingresos Mensuales -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 transition duration-300 hover:shadow-xl">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium text-gray-500">Ingresos Mensuales</p>
                    <!-- Icono de Dinero (Placeholder SVG) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <p class="text-3xl font-bold text-gray-900 mt-1">$24,780</p>
                <div class="flex items-center mt-3 text-sm">
                    <span class="text-green-600 font-semibold flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 7 13.5 16.5 8.5 11.5 1 19"/></svg>
                        +12.1%
                    </span>
                    <span class="text-gray-500 ml-2">vs. mes pasado</span>
                </div>
            </div>

            <!-- Card 3: Tasa de Conversión -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 transition duration-300 hover:shadow-xl">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium text-gray-500">Tasa de Conversión</p>
                    <!-- Icono de Flecha (Placeholder SVG) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-yellow-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                </div>
                <p class="text-3xl font-bold text-gray-900 mt-1">3.5%</p>
                <div class="flex items-center mt-3 text-sm">
                    <span class="text-red-600 font-semibold flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 17 13.5 7.5 8.5 12.5 1 5"/></svg>
                        -0.8%
                    </span>
                    <span class="text-gray-500 ml-2">vs. mes pasado</span>
                </div>
            </div>

            <!-- Card 4: Pedidos Pendientes -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 transition duration-300 hover:shadow-xl">
                <div class="flex items-center justify-between">
                    <p class="text-sm font-medium text-gray-500">Pedidos Pendientes</p>
                    <!-- Icono de Lista/Reloj (Placeholder SVG) -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M10 16h4"/></svg>
                </div>
                <p class="text-3xl font-bold text-gray-900 mt-1">12</p>
                <div class="flex items-center mt-3 text-sm">
                    <span class="text-gray-500 font-semibold">
                        0%
                    </span>
                    <span class="text-gray-500 ml-2">sin cambios</span>
                </div>
            </div>
        </div>

        <!-- SECCIÓN 2: GRÁFICAS (2 COLUMNAS EN DESKTOP) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- Chart Card 1: Gráfica de Línea -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">Evolución de Usuarios (Anual)</h2>
                <!-- Contenedor para Chart.js. Altura definida para evitar CLS. -->
                <div class="relative h-72 md:h-80 lg:h-96">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

            <!-- Chart Card 2: Gráfica de Barras -->
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
                <h2 class="text-xl font-semibold text-gray-700 mb-4">Ingresos Mensuales</h2>
                <!-- Contenedor para Chart.js. Altura definida para evitar CLS. -->
                <div class="relative h-72 md:h-80 lg:h-96">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- CÓDIGO JAVASCRIPT PARA INICIALIZAR LAS GRÁFICAS -->
    <script>
        // Función de inicialización para asegurar que el DOM esté cargado
        document.addEventListener('DOMContentLoaded', () => {

            // Datos para la gráfica de línea
            const lineCtx = document.getElementById('lineChart').getContext('2d');
            const lineChart = new Chart(lineCtx, {
              type: 'line',
              data: {
                labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
                datasets: [{
                  label: 'Usuarios 2024',
                  data: [5000, 5500, 6000, 6200, 6800, 7200, 7500, 8000, 8249, 8500, 8800, 9100],
                  borderColor: 'rgb(59, 130, 246)', // Tailwind blue-500
                  backgroundColor: 'rgba(59, 130, 246, 0.1)',
                  tension: 0.3,
                  fill: true
                }, {
                  label: 'Usuarios 2023',
                  data: [4000, 4200, 4500, 4800, 5100, 5400, 5600, 5900, 6200, 6500, 6800, 7000],
                  borderColor: 'rgb(107, 114, 128)', // Tailwind gray-500
                  backgroundColor: 'rgba(107, 114, 128, 0.1)',
                  tension: 0.3,
                  fill: true
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: {
                    position: 'top',
                  }
                },
                scales: {
                  y: {
                    beginAtZero: true
                  }
                }
              }
            });

            // Datos para la gráfica de barras
            const barCtx = document.getElementById('barChart').getContext('2d');
            const barChart = new Chart(barCtx, {
              type: 'bar',
              data: {
                labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
                datasets: [{
                  label: 'Ingresos 2024 ($)',
                  data: [15000, 16500, 18000, 19500, 21000, 22500, 23000, 24000, 24780, 26000, 27500, 29000],
                  backgroundColor: 'rgba(59, 130, 246, 0.8)' // Tailwind blue-500 oscuro
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: {
                    position: 'top',
                  }
                },
                scales: {
                  y: {
                    beginAtZero: true
                  }
                }
              }
            });
        });
    </script>

</body>
</html>
